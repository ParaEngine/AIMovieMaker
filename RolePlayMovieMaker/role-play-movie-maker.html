<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>角色扮演电影制作工具</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #181b23;
    --panel-2: #20242e;
    --border: #2a2f3c;
    --text: #e6e8ee;
    --muted: #8a92a3;
    --accent: #4f8cff;
    --accent-hover: #6ea0ff;
    --ok: #4ade80;
    --warn: #fbbf24;
    --err: #f87171;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  /* Topbar (AIMovieMaker-style) */
  header#appHeader {
    height: 48px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    flex-wrap: nowrap;
    position: relative;
    z-index: 50;
  }
  header#appHeader .topbar-brand {
    display: flex; align-items: center; gap: 10px;
    min-width: 0; flex-shrink: 0; white-space: nowrap;
  }
  header#appHeader .app-emoji-btn {
    width: 32px; height: 32px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 18px; line-height: 1;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }
  header#appHeader .app-emoji-btn:hover {
    background: #2a2f3c; border-color: var(--accent); transform: translateY(-1px);
  }
  header#appHeader .app-emoji-btn:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  header#appHeader .brand-title { font-size: 14px; font-weight: 600; color: var(--text); }
  header#appHeader .topbar-context {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    min-width: 0; white-space: nowrap; overflow: hidden;
  }
  header#appHeader .topbar-actions {
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0; white-space: nowrap; position: relative;
  }
  /* File menu */
  .file-menu-wrap { position: relative; }
  .file-menu-btn {
    background: transparent; border: none; color: var(--text);
    font-size: 13px; font-weight: 600; cursor: pointer;
    padding: 6px 10px; border-radius: 6px;
    display: inline-flex; align-items: center; gap: 4px;
    transition: background 0.15s;
  }
  .file-menu-btn:hover { background: var(--panel-2); }
  .file-menu-btn .caret { font-size: 9px; opacity: 0.7; }
  .file-menu-dropdown {
    display: none; position: absolute; top: 100%; left: 0; margin-top: 4px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 0; min-width: 200px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35); z-index: 200;
  }
  .file-menu-dropdown.open { display: block; }
  .file-menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; font-size: 13px; color: var(--text);
    cursor: pointer; transition: background 0.15s;
    background: transparent; border: none; width: 100%; text-align: left;
    border-radius: 0; font-weight: 500;
  }
  .file-menu-item:hover:not(:disabled) { background: var(--panel-2); }
  .file-menu-item:disabled { opacity: 0.45; cursor: not-allowed; }
  .file-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }
  /* Project title input in topbar */
  .topbar-project-input {
    width: 100%;
    max-width: min(42vw, 480px);
    background: transparent;
    border: none; border-bottom: 1px solid transparent;
    color: var(--text); font-size: 14px; font-weight: 600;
    padding: 4px 6px; border-radius: 4px;
    text-align: center;
  }
  .topbar-project-input::placeholder { color: var(--muted); font-weight: 400; }
  .topbar-project-input:hover { background: var(--panel-2); }
  .topbar-project-input:focus { outline: none; background: var(--panel-2); border-bottom-color: var(--accent); }
  .topbar-share-btn {
    background: var(--accent); color: white; border: none;
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .topbar-share-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .topbar-share-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .topbar-save-btn {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .topbar-save-btn:hover:not(:disabled) { background: #2a2f3c; border-color: var(--accent); }
  .topbar-save-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .topbar-login-btn {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); padding: 5px 12px;
    border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer;
  }
  .topbar-login-btn:hover { background: #2a2f3c; }
  header#appHeader h1 { font-size: 14px; margin: 0; font-weight: 600; }
  header#appHeader .sub { color: var(--muted); font-size: 12px; }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .panel h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 0 0 12px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 10px 0 4px;
  }
  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font: inherit;
    font-size: 13px;
  }
  .password-field {
    position: relative;
    display: flex;
    align-items: center;
  }
  .password-field input { padding-right: 42px; }
  .password-toggle {
    position: absolute;
    right: 4px;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border-radius: 5px;
    color: var(--muted);
    background: transparent;
    border: 0;
  }
  .password-toggle:hover:not(:disabled) {
    color: var(--text);
    background: #2a2f3c;
  }
  .password-toggle svg {
    width: 17px;
    height: 17px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .password-toggle .icon-eye-off { display: none; }
  .password-toggle.is-visible .icon-eye { display: none; }
  .password-toggle.is-visible .icon-eye-off { display: block; }
  textarea { font-family: var(--mono); resize: vertical; min-height: 120px; }
  * {
    scrollbar-width: thin;
    scrollbar-color: #4a5368 #151821;
  }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track {
    background: #151821;
    border-radius: 999px;
  }
  *::-webkit-scrollbar-thumb {
    background: #4a5368;
    border: 2px solid #151821;
    border-radius: 999px;
  }
  *::-webkit-scrollbar-thumb:hover { background: #64708a; }
  *::-webkit-scrollbar-corner { background: #151821; }
  input[type=file] {
    width: 100%;
    color: var(--muted);
    font-size: 13px;
  }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 6px;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover:not(:disabled) { background: #2a2f3c; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .status {
    margin-top: 12px;
    padding: 8px 10px;
    background: var(--panel-2);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    min-height: 32px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    border: 1px solid var(--border);
  }
  .status .ok { color: var(--ok); }
  .status .warn { color: var(--warn); }
  .status .err { color: var(--err); }
  .progress {
    height: 6px;
    background: var(--panel-2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress > div {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }
  pre.output, textarea.output {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 12px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    color: var(--text);
    width: 100%;
    min-height: 240px;
    resize: vertical;
    display: block;
  }
  textarea.output:focus { outline: 1px solid var(--accent); }
  textarea.output[readonly] { opacity: 0.95; }
  /* Make the Output (JSON) panel match the height of the Input panel
     so the textarea can show many more lines on wide (two-column) layouts. */
  @media (min-width: 901px) {
    main > .panel:nth-of-type(2) {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    main > .panel:nth-of-type(2) > textarea.output {
      flex: 1 1 auto;
      max-height: none;
    }
  }
  /* Timeline */
  #timelinePanel { overflow: hidden; }
  .timeline-panel-head { display: flex; align-items: center; justify-content: flex-start; gap: 12px; margin-bottom: 10px; }
  .timeline-panel-head h2 { margin: 0; }
  .timeline-panel-head button { padding: 6px 12px; font-size: 12px; flex: 0 0 auto; }
  .timeline-grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 10px; align-items: start; min-width: 0; }
  .player-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    align-items: start;
    min-width: 0;
  }
  @media (max-width: 900px) { .player-row { grid-template-columns: 1fr; } }
  .player-cell { display: flex; flex-direction: column; gap: 4px; min-width: 0; overflow: hidden; }
  .player-cell h3 { margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .player-cell h3.video-title { display: flex; align-items: center; justify-content: flex-start; gap: 8px; min-width: 0; }
  .player-cell h3.video-title .source-label {
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--muted); font-weight: 500; text-transform: none; letter-spacing: 0;
  }
  .timeline-file-input { display: none; }
  .icon-file-btn {
    width: 24px; height: 24px; flex: 0 0 24px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--panel-2); color: var(--text);
    cursor: pointer; font-size: 14px; line-height: 1;
    letter-spacing: 0; text-transform: none;
  }
  .icon-file-btn:hover { border-color: var(--accent); background: #2a2f3c; }
  .timeline-toolbar {
    display: grid; grid-template-columns: auto minmax(140px, 240px) auto;
    gap: 8px; align-items: center; min-width: 0;
    justify-self: end; width: max-content; max-width: 100%;
    margin-top: 2px;
  }
  .timeline-zoom-label { margin: 0; color: var(--muted); font-size: 11px; }
  .timeline-zoom-value { color: var(--muted); font: 11px var(--mono); white-space: nowrap; }
  @media (max-width: 700px) {
    .timeline-toolbar { grid-template-columns: auto 1fr auto; width: 100%; }
  }
  .timeline-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
    user-select: none;
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
  }
  .timeline-scroll {
    width: 100%;
    max-width: 100%;
    min-width: 0;
    overflow-x: auto;
    overflow-y: hidden;
    overscroll-behavior: contain;
    touch-action: pan-x;
    padding-bottom: 4px;
  }
  .timeline-inner { position: relative; min-width: 100%; max-width: none; }
  .time-ruler {
    position: relative; height: 18px; font-size: 10px; color: var(--muted);
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .time-ruler span { position: absolute; transform: translateX(-50%); top: 2px; }
  .time-ruler span:first-of-type { transform: none; }
  .time-ruler span:last-child { transform: translateX(-100%); }
  .time-ruler .tick { position: absolute; top: 12px; width: 1px; height: 6px; background: var(--border); }
  .track {
    position: relative; height: 44px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
    cursor: crosshair;
  }
  .track-label {
    position: absolute; left: 6px; top: 2px; display: inline-flex; align-items: center; gap: 3px;
    width: max-content; max-width: calc(100vw - 48px); padding: 0 6px 2px 0; font-size: 10px; line-height: 12px;
    background: var(--panel-2); box-shadow: 8px 0 8px var(--panel-2);
    color: var(--muted); pointer-events: none; z-index: 4;
    transform: translateX(var(--timeline-scroll-left, 0px));
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .track-count { color: var(--text); font-weight: 700; letter-spacing: 0; }
  .bar {
    position: absolute; top: 19px; height: 22px;
    background: var(--accent); border-radius: 3px; cursor: pointer;
    font-size: 10px; color: #fff; padding: 3px 4px 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: 0.65; transition: opacity 0.1s, background 0.1s, box-shadow 0.1s;
    box-sizing: border-box;
  }
  .bar:hover { opacity: 1; }
  .bar.scene { background: #b266ff; }
  .bar.interaction-point {
    background: var(--warn);
    color: #241a00;
    min-width: 14px;
    text-align: center;
    font-weight: 700;
  }
  .bar.disabled { background: #4a5060; color: #c0c5d0; opacity: 0.42; text-decoration: line-through; }
  .bar.selected { opacity: 1; box-shadow: 0 0 0 2px var(--accent-hover) inset; }
  .bar.active { opacity: 1; box-shadow: 0 0 0 2px var(--text) inset; background: var(--ok); color: #0b1; color: #08130a; font-weight: 600; }
  .time-cursor {
    position: absolute; top: 18px; bottom: 0; width: 2px;
    background: var(--err); pointer-events: none; z-index: 3;
    box-shadow: 0 0 6px var(--err);
  }
  .timeline-empty { color: var(--muted); font-size: 12px; padding: 12px; text-align: center; }
  .scene-editor {
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--panel-2); padding: 10px;
    min-height: 0;
  }
  .scene-editor-empty { color: var(--muted); font-size: 12px; text-align: center; padding: 4px; }
  .scene-editor-form { display: flex; flex-direction: column; gap: 8px; }
  .scene-editor-form[hidden] { display: none; }
  .scene-editor-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .scene-editor-head h3 { margin: 0; font-size: 13px; color: var(--text); }
  .scene-editor-actions { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .scene-editor-actions button, .subtitle-editor-head button { padding: 5px 10px; font-size: 12px; }
  .scene-toggle { margin: 0; display: inline-flex; align-items: center; gap: 6px; color: var(--text); }
  .scene-editor-grid {
    display: grid;
    grid-template-columns: 136px 136px minmax(180px, 1fr) minmax(220px, 1.2fr) minmax(170px, 0.9fr);
    gap: 8px;
    align-items: start;
  }
  .scene-editor-grid label { margin: 0; }
  .scene-editor-grid .wide { grid-column: auto; }
  .scene-editor-grid textarea { min-height: 42px; height: 42px; font-family: inherit; resize: vertical; }
  .scene-editor-grid input[type=text], .scene-editor-grid textarea { padding: 6px 8px; font-size: 12px; }
  .subtitle-editor-panel, .interaction-editor-panel {
    border-top: 1px solid var(--border);
    margin-top: 2px;
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .subtitle-editor-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .subtitle-editor-head h3 { margin: 0; font-size: 13px; color: var(--text); }
  .subtitle-list[hidden] { display: none; }
  .subtitle-list { display: flex; flex-direction: column; gap: 6px; }
  .subtitle-list-item {
    display: grid;
    grid-template-columns: 118px 118px minmax(130px, 0.8fr) minmax(220px, 1.6fr) auto;
    gap: 8px;
    align-items: end;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.03);
    padding: 7px 8px;
    min-width: 0;
  }
  .subtitle-list-item.disabled { opacity: 0.55; }
  .subtitle-list-item label {
    margin: 0;
    min-width: 0;
    color: var(--muted);
    font-size: 11px;
  }
  .subtitle-list-item input[type=text], .subtitle-list-item textarea {
    padding: 6px 8px;
    font-size: 12px;
  }
  .subtitle-list-start, .subtitle-list-end { font-family: var(--mono); }
  .subtitle-list-text-label { min-width: 0; }
  .subtitle-list-text {
    min-height: 32px;
    height: 32px;
    font-family: inherit;
    resize: vertical;
  }
  .subtitle-list-disabled {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 32px;
    white-space: nowrap;
    color: var(--text) !important;
  }
  .subtitle-editor-body[hidden] { display: none; }
  .interaction-editor-body[hidden] { display: none; }
  .subtitle-editor-grid {
    grid-template-columns: 136px 136px minmax(140px, 0.8fr) minmax(240px, 1.3fr) auto;
    align-items: end;
  }
  .interaction-json-label { margin: 0; }
  .interaction-json-label textarea {
    min-height: 148px;
    height: 148px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.45;
    resize: vertical;
  }
  .ip-skill-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-top: 6px;
  }
  .ip-skill-option {
    margin: 0;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px;
    align-items: start;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel-2);
    padding: 9px;
    color: var(--text);
  }
  .ip-skill-option input { margin-top: 3px; }
  .ip-skill-option strong { display: block; font-size: 12px; color: var(--text); }
  .ip-skill-option small { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; line-height: 1.4; }
  @media (max-width: 700px) { .ip-skill-grid { grid-template-columns: 1fr; } }
  .subtitle-toggle { align-self: end; min-height: 32px; padding-bottom: 2px; white-space: nowrap; }
  .scene-editor .hint { margin-top: 0; }
  @media (max-width: 1100px) { .scene-editor-grid, .subtitle-list-item { grid-template-columns: 1fr 1fr; } .scene-editor-grid .wide, .subtitle-list-text-label { grid-column: 1 / -1; } }
  @media (max-width: 700px) { .scene-editor-grid, .subtitle-list-item { grid-template-columns: 1fr; } .subtitle-list-text-label { grid-column: auto; } }
  #timelineVideo, #timelineYT {
    width: 100%;
    aspect-ratio: 16 / 9;
    height: auto;
    max-height: none;
    background: black;
    border-radius: 6px;
  }
  #timelineVideo { object-fit: contain; }
  #timelineYT iframe { width: 100% !important; height: 100% !important; border: 0; display: block; }
  #previewCanvas { width: 100%; max-height: none; background: #000; border-radius: 6px; display: block; aspect-ratio: 16 / 9; }
  .movie-overview-popup {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1100;
    background: rgba(0, 0, 0, 0.68);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .movie-overview-popup.open { display: flex; }
  .movie-overview-card {
    width: min(860px, calc(100vw - 32px));
    max-height: min(760px, calc(100vh - 32px));
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 22px 80px rgba(0, 0, 0, 0.45);
  }
  .movie-overview-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    padding: 18px 20px 14px;

<body>

<!--
  Pipeline-driven editor. Stages live in view_*.js modules and are toggled
  via the right sidebar. The Projects view is shown first (see app.js).
-->
<div id="appShell">
  <aside id="stageSidebar"></aside>
  <main id="appMain"></main>
</div>

<script type="module">
    const sdkCdnUrl = 'https://cdn.keepwork.com/sdk/keepworkSDK.iife.js?v=20260501';
    const loadScript = src => new Promise((resolve, reject) => {
        const script = Object.assign(document.createElement('script'), { src, onload: resolve, onerror: reject });
        document.head.appendChild(script);
    });
    const isLocal = ['127.0.0.1', 'localhost'].includes(window.location.hostname);
    // The SDK is also lazy-loaded on first need from kwsdk.js, but pre-loading
    // it here keeps Keepwork features (login, save/share) responsive.
    try {
        if (isLocal) {
            try { await import('/keepworkSDK/index.js'); } catch (_) { await loadScript(sdkCdnUrl); }
        } else {
            await loadScript(sdkCdnUrl);
        }
    } catch (e) { console.warn('Keepwork SDK preload failed (will retry on demand):', e); }

    await import('./js/app.js');
</script>
</body>
